sonar.organization=thstanton
sonar.projectKey=thstanton_gigman
sonar.projectName=GigMan

# Source roots — both apps in the monorepo
sonar.sources=apps/api/src,apps/web/src

# Exclude generated, tooling, and non-production files
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/prisma/seed.ts,\
  **/src/scripts/**,\
  **/.storybook/**

# Treat test and story files as test code (excluded from duplication/coverage gap analysis)
sonar.test.inclusions=\
  **/*.spec.ts,\
  **/*.spec.tsx,\
  **/*.stories.ts,\
  **/*.stories.tsx

# API (Jest) — coverage generated by sonar workflow
sonar.javascript.lcov.reportPaths=apps/api/coverage/lcov.info

# Web (Vitest) — coverage not yet configured; add apps/web/coverage/lcov.info
# here once @vitest/coverage-v8 is installed and test:coverage script is added
