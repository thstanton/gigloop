name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history required — SonarCloud uses git blame for new-code detection
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.3'

      - uses: actions/cache@v4
        id: cache
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}

      - run: bun install --frozen-lockfile
        if: steps.cache.outputs.cache-hit != 'true'

      - run: cd apps/api && bunx prisma generate
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          DATABASE_URL: postgresql://user:password@localhost/db

      # API: Jest has built-in coverage — outputs to apps/api/coverage/lcov.info
      - name: Test API with coverage
        run: cd apps/api && bun run test -- --coverage

      # Web: Vitest with v8 coverage — outputs to apps/web/coverage/lcov.info
      - name: Test web with coverage
        run: cd apps/web && bun run test:coverage

      - uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
