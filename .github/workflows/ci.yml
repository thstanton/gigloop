name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.3'
      - uses: actions/cache@v4
        id: cache
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
      - run: bun install --frozen-lockfile
        if: steps.cache.outputs.cache-hit != 'true'
      - run: cd apps/api && bunx prisma generate
        env:
          DATABASE_URL: postgresql://user:password@localhost/db
      - run: cd apps/api && bun run lint
      - run: cd apps/web && bun run lint
      - name: Story presence (ADR-0030)
        run: node scripts/check-stories.mjs

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.3'
      - uses: actions/cache@v4
        id: cache
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
      - run: bun install --frozen-lockfile
        if: steps.cache.outputs.cache-hit != 'true'
      - run: cd apps/api && bunx prisma generate
        env:
          DATABASE_URL: postgresql://user:password@localhost/db
      - run: cd apps/api && bun run test
      - run: cd apps/web && bun run test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.3'
      - uses: actions/cache@v4
        id: cache
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
      - run: bun install --frozen-lockfile
        if: steps.cache.outputs.cache-hit != 'true'
      - run: cd apps/api && bunx prisma generate
        env:
          DATABASE_URL: postgresql://user:password@localhost/db
      - run: cd apps/api && bun run build
      - run: cd apps/web && bun run build

  integration:
    name: Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.3'
      - uses: actions/cache@v4
        id: cache
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
      - run: bun install --frozen-lockfile
        if: steps.cache.outputs.cache-hit != 'true'
      - name: Provision Neon branch
        id: neon
        run: bash scripts/neon-provision.sh
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
      - name: Run migrations
        run: cd apps/api && bunx prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
      - name: Generate Prisma client
        run: cd apps/api && bunx prisma generate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
      - name: Run integration tests
        run: cd apps/api && bun run test:integration
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
      - name: Teardown Neon branch
        if: always()
        run: bash scripts/neon-teardown.sh
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
          NEON_BRANCH_ID: ${{ steps.neon.outputs.NEON_BRANCH_ID }}
