name: CI

on:
  pull_request:
    branches: [main]

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'package.json'
              - 'bun.lockb'
              - '.github/workflows/**'
            web:
              - 'apps/web/**'
              - 'package.json'
              - 'bun.lockb'
              - 'scripts/**'
              - '.github/workflows/**'
            e2e:
              - 'e2e/**'
              - 'apps/api/**'
              - 'apps/web/**'
              - 'package.json'
              - 'bun.lockb'
              - '.github/workflows/**'

  lint:
    name: Lint
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.3'
      - uses: actions/cache@v4
        id: cache
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
      - run: bun install --frozen-lockfile
        if: steps.cache.outputs.cache-hit != 'true'
      - run: cd apps/api && bunx prisma generate
        if: needs.detect-changes.outputs.api == 'true'
        env:
          DATABASE_URL: postgresql://user:password@localhost/db
          DIRECT_URL: postgresql://user:password@localhost/db
      - run: cd apps/api && bun run lint
        if: needs.detect-changes.outputs.api == 'true'
      - run: cd apps/web && bun run lint
        if: needs.detect-changes.outputs.web == 'true'
      - name: Story presence (ADR-0030)
        if: needs.detect-changes.outputs.web == 'true'
        run: node scripts/check-stories.mjs

  test:
    name: Test
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.3'
      - uses: actions/cache@v4
        id: cache
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
      - run: bun install --frozen-lockfile
        if: steps.cache.outputs.cache-hit != 'true'
      - run: cd apps/api && bunx prisma generate
        if: needs.detect-changes.outputs.api == 'true'
        env:
          DATABASE_URL: postgresql://user:password@localhost/db
          DIRECT_URL: postgresql://user:password@localhost/db
      - run: cd apps/api && bun run test
        if: needs.detect-changes.outputs.api == 'true'
      - run: cd apps/web && bun run test
        if: needs.detect-changes.outputs.web == 'true'
      - name: Shortcut-detector unit tests (ADR-0030)
        if: needs.detect-changes.outputs.web == 'true'
        run: node --test scripts/shortcut-detector.test.mjs
      - name: Terminal-signal unit tests (ADR-0045)
        if: needs.detect-changes.outputs.web == 'true'
        run: node --test scripts/terminal-signal.test.mjs
      - name: Ralph-stream formatter unit tests (ADR-0040)
        if: needs.detect-changes.outputs.web == 'true'
        run: node --test scripts/ralph-stream.test.mjs
      - name: Read-worked-issue unit tests (#458)
        if: needs.detect-changes.outputs.web == 'true'
        run: node --test scripts/read-worked-issue.test.mjs

  build:
    name: Build
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.3'
      - uses: actions/cache@v4
        id: cache
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
      - run: bun install --frozen-lockfile
        if: steps.cache.outputs.cache-hit != 'true'
      - run: cd apps/api && bunx prisma generate
        if: needs.detect-changes.outputs.api == 'true'
        env:
          DATABASE_URL: postgresql://user:password@localhost/db
          DIRECT_URL: postgresql://user:password@localhost/db
      - run: cd apps/api && bun run build
        if: needs.detect-changes.outputs.api == 'true'
      # `nest build` only typechecks src/** — the seed script is outside every
      # other gate, so it gets its own --noEmit pass here (#639).
      - name: Typecheck prisma/seed.ts (#639)
        if: needs.detect-changes.outputs.api == 'true'
        run: cd apps/api && bun run typecheck:seed
      - run: cd apps/web && bun run build
        if: needs.detect-changes.outputs.web == 'true'

  integration:
    name: Integration
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.3'
      - uses: actions/cache@v4
        id: cache
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
      - run: bun install --frozen-lockfile
        if: steps.cache.outputs.cache-hit != 'true'
      - name: Create Neon branch
        id: neon
        uses: neondatabase/create-branch-action@v6
        with:
          api_key: ${{ secrets.NEON_API_KEY }}
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ci-integration-${{ github.run_id }}
      - name: Run migrations
        run: cd apps/api && bunx prisma migrate deploy
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}
          DIRECT_URL: ${{ steps.neon.outputs.db_url }}
      - name: Generate Prisma client
        run: cd apps/api && bunx prisma generate
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}
          DIRECT_URL: ${{ steps.neon.outputs.db_url }}
      - name: Run integration tests
        run: cd apps/api && bun run test:integration
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}
          DIRECT_URL: ${{ steps.neon.outputs.db_url }}
      - name: Delete Neon branch
        # Only delete when create-branch produced an id — otherwise neonctl errors
        # with "not enough arguments" and masks the real create/migrate/test failure (#657).
        if: always() && steps.neon.outputs.branch_id != ''
        uses: neondatabase/delete-branch-action@v3
        with:
          api_key: ${{ secrets.NEON_API_KEY }}
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: ${{ steps.neon.outputs.branch_id }}

  # Real-stack Playwright suite (ADR-0048). Non-blocking with retries: 2 (set in
  # playwright.config), mirroring how integration entered — deliberately promoted
  # to a required check only after it proves stable. Excluded from ci-result.
  e2e:
    name: E2E
    needs: detect-changes
    if: needs.detect-changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.1.3'
      - uses: actions/cache@v4
        id: cache
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
      - run: bun install --frozen-lockfile
        if: steps.cache.outputs.cache-hit != 'true'
      - name: Create Neon branch
        id: neon
        uses: neondatabase/create-branch-action@v6
        with:
          api_key: ${{ secrets.NEON_API_KEY }}
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: ci-e2e-${{ github.run_id }}
      - name: Run migrations
        run: cd apps/api && bunx prisma migrate deploy
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}
          DIRECT_URL: ${{ steps.neon.outputs.db_url }}
      - name: Generate Prisma client
        run: cd apps/api && bunx prisma generate
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}
          DIRECT_URL: ${{ steps.neon.outputs.db_url }}
      - name: Install Playwright browser
        run: cd e2e && bunx playwright install --with-deps chromium
      - name: Run e2e suite
        run: bun run test:e2e
        env:
          # The suite boots the real API (test-mode fakes) + served web build
          # against this ephemeral branch, and signs in the real Clerk test user.
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}
          DIRECT_URL: ${{ steps.neon.outputs.db_url }}
          CLERK_SECRET_KEY: ${{ secrets.E2E_CLERK_SECRET_KEY }}
          CLERK_PUBLISHABLE_KEY: ${{ secrets.E2E_CLERK_PUBLISHABLE_KEY }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.E2E_CLERK_PUBLISHABLE_KEY }}
          E2E_TEST_USER_ID: ${{ secrets.E2E_TEST_USER_ID }}
          E2E_CLERK_USER_EMAIL: ${{ secrets.E2E_CLERK_USER_EMAIL }}
          E2E_CLERK_USER_PASSWORD: ${{ secrets.E2E_CLERK_USER_PASSWORD }}
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
      - name: Delete Neon branch
        # Only delete when create-branch produced an id — otherwise neonctl errors
        # with "not enough arguments" and masks the real create/migrate/test failure (#657).
        if: always() && steps.neon.outputs.branch_id != ''
        uses: neondatabase/delete-branch-action@v3
        with:
          api_key: ${{ secrets.NEON_API_KEY }}
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: ${{ steps.neon.outputs.branch_id }}

  ci-result:
    name: CI
    needs: [lint, test, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Pass if all required jobs succeeded or were skipped
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
